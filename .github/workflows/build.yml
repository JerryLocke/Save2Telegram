name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version used for the extension manifest, CRX/zip filenames, and image tag, for example 0.1.0"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: save2telegram-backend

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          VERSION="$INPUT_VERSION"
          if [ -z "$VERSION" ] && [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="$(node -p "require('./crx/manifest.json').version")"
          fi

          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+(\.[0-9]+){0,3}$'; then
            echo "Version must be 1 to 4 dot-separated integers, for example 0.1.0." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  extension:
    name: Build extension
    runs-on: ubuntu-latest
    needs: prepare
    env:
      CHROME_EXTENSION_PRIVATE_KEY_B64: ${{ secrets.CHROME_EXTENSION_PRIVATE_KEY_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest
        run: node -e "JSON.parse(require('fs').readFileSync('crx/manifest.json', 'utf8'))"

      - name: Apply build version
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const manifestPath = 'crx/manifest.json';
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          manifest.version = process.env.VERSION;
          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Create extension zip
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p dist
          cd crx
          zip -r "../dist/save2telegram-extension-${VERSION}.zip" .

      - name: Install Chromium for CRX signing
        if: ${{ env.CHROME_EXTENSION_PRIVATE_KEY_B64 != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Sign CRX
        if: ${{ env.CHROME_EXTENSION_PRIVATE_KEY_B64 != '' }}
        run: |
          set -euo pipefail
          printf '%s' "$CHROME_EXTENSION_PRIVATE_KEY_B64" | base64 -d > extension.pem
          chmod 600 extension.pem
          CHROMIUM_BIN="$(command -v chromium-browser || command -v chromium || command -v google-chrome)"
          "$CHROMIUM_BIN" --no-sandbox --disable-gpu --pack-extension="$PWD/crx" --pack-extension-key="$PWD/extension.pem"
          mv crx.crx "dist/save2telegram-extension-${{ needs.prepare.outputs.version }}.crx"
          rm -f extension.pem

      - name: Upload extension zip
        uses: actions/upload-artifact@v4
        with:
          name: save2telegram-extension-${{ needs.prepare.outputs.version }}-zip
          path: dist/save2telegram-extension-${{ needs.prepare.outputs.version }}.zip
          if-no-files-found: error

      - name: Upload signed CRX
        if: ${{ env.CHROME_EXTENSION_PRIVATE_KEY_B64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: save2telegram-extension-${{ needs.prepare.outputs.version }}-crx
          path: dist/save2telegram-extension-${{ needs.prepare.outputs.version }}.crx
          if-no-files-found: error

  image:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply backend version
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const packagePath = 'backend/package.json';
          const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          pkg.version = process.env.VERSION;
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
