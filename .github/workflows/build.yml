name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: save2telegram-backend

jobs:
  extension:
    name: Build extension
    runs-on: ubuntu-latest
    env:
      CHROME_EXTENSION_PRIVATE_KEY_B64: ${{ secrets.CHROME_EXTENSION_PRIVATE_KEY_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest
        run: node -e "JSON.parse(require('fs').readFileSync('crx/manifest.json', 'utf8'))"

      - name: Create extension zip
        run: |
          mkdir -p dist
          cd crx
          zip -r ../dist/save2telegram-extension.zip .

      - name: Install Chromium for CRX signing
        if: ${{ env.CHROME_EXTENSION_PRIVATE_KEY_B64 != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Sign CRX
        if: ${{ env.CHROME_EXTENSION_PRIVATE_KEY_B64 != '' }}
        run: |
          set -euo pipefail
          printf '%s' "$CHROME_EXTENSION_PRIVATE_KEY_B64" | base64 -d > extension.pem
          chmod 600 extension.pem
          CHROMIUM_BIN="$(command -v chromium-browser || command -v chromium || command -v google-chrome)"
          "$CHROMIUM_BIN" --no-sandbox --disable-gpu --pack-extension="$PWD/crx" --pack-extension-key="$PWD/extension.pem"
          mv crx.crx dist/save2telegram-extension.crx
          rm -f extension.pem

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: save2telegram-extension
          path: dist/save2telegram-extension.*
          if-no-files-found: error

  image:
    name: Build backend image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
